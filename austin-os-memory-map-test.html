<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Austin OS Memory Map</title>
<style>
body{margin:0;background:#08111f;color:white;font-family:system-ui,sans-serif;overflow:hidden}#info{position:fixed;top:12px;left:12px;right:12px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.2);border-radius:18px;padding:14px;z-index:2}#panel{position:fixed;bottom:12px;left:12px;right:12px;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.2);border-radius:18px;padding:14px;z-index:2}button{border:1px solid rgba(255,255,255,.2);border-radius:999px;background:#1b2a4a;color:white;padding:9px 12px;font-weight:700}.label{color:white;font:700 13px system-ui;text-shadow:0 2px 8px black;background:rgba(0,0,0,.4);border-radius:999px;padding:4px 8px}
</style>
</head>
<body>
<div id="info"><h1 style="margin:0">Austin OS</h1><p style="margin:6px 0;color:#b8c3e6">Drag to orbit. Tap nodes. This is a public redacted memory map.</p><button id="reset">Reset</button></div>
<div id="panel"><b id="title">Austin</b><p id="desc" style="color:#b8c3e6;margin:6px 0 0">Tap a node to inspect it.</p></div>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import {OrbitControls} from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
import {CSS2DRenderer,CSS2DObject} from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/renderers/CSS2DRenderer.js';
const nodes=[['Austin','Core context',0,0,0,0x83f0d2],['Trace','Main project',-3,1,0,0x82a8ff],['Dex','Orchestrator',3,1,0,0xffd37e],['Memory Repo','Source of truth',-2,-2,0,0xc08cff],['Do Not Assume','Stale-memory guardrail',2,-2,0,0xff9f9f],['Decisions','Recorded choices',0,-3,1,0xffffff]];
const edges=[[0,1],[0,2],[0,3],[0,4],[1,2],[1,5],[3,5],[4,3]];
const scene=new THREE.Scene();const cam=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,100);cam.position.set(0,1.5,9);const r=new THREE.WebGLRenderer({antialias:true});r.setSize(innerWidth,innerHeight);document.body.appendChild(r.domElement);const lr=new CSS2DRenderer();lr.setSize(innerWidth,innerHeight);lr.domElement.style.position='fixed';lr.domElement.style.inset='0';lr.domElement.style.pointerEvents='none';document.body.appendChild(lr.domElement);const controls=new OrbitControls(cam,r.domElement);controls.enableDamping=true;scene.add(new THREE.AmbientLight(0xffffff,1.5));const light=new THREE.DirectionalLight(0xffffff,2);light.position.set(4,5,8);scene.add(light);const meshes=[];function label(t){const d=document.createElement('div');d.className='label';d.textContent=t;return new CSS2DObject(d)}nodes.forEach((n,i)=>{const m=new THREE.Mesh(new THREE.SphereGeometry(i?0.32:0.48,40,40),new THREE.MeshStandardMaterial({color:n[5],emissive:n[5],emissiveIntensity:.25}));m.position.set(n[2],n[3],n[4]);m.userData={name:n[0],desc:n[1]};scene.add(m);meshes.push(m);const l=label(n[0]);l.position.set(n[2],n[3]+.55,n[4]);scene.add(l)});const mat=new THREE.LineBasicMaterial({color:0x83f0d2,transparent:true,opacity:.45});edges.forEach(e=>scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([meshes[e[0]].position,meshes[e[1]].position]),mat)));const ray=new THREE.Raycaster(),ptr=new THREE.Vector2();r.domElement.addEventListener('pointerup',ev=>{ptr.x=ev.clientX/innerWidth*2-1;ptr.y=-(ev.clientY/innerHeight*2-1);ray.setFromCamera(ptr,cam);const hit=ray.intersectObjects(meshes)[0];if(hit){title.textContent=hit.object.userData.name;desc.textContent=hit.object.userData.desc;meshes.forEach(m=>m.scale.setScalar(m===hit.object?1.5:1));controls.target.copy(hit.object.position)}});reset.onclick=()=>{cam.position.set(0,1.5,9);controls.target.set(0,0,0)};function loop(){requestAnimationFrame(loop);scene.rotation.y+=.0015;controls.update();r.render(scene,cam);lr.render(scene,cam)}loop();addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();r.setSize(innerWidth,innerHeight);lr.setSize(innerWidth,innerHeight)});
</script>
</body>
</html>
